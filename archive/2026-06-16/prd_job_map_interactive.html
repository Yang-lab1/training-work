    .multi-select { position:relative; min-width:0; }

      color:#0f172a; font-size:12.5px; font-weight:650; line-height:1.35; letter-spacing:.005em; cursor:pointer; box-sizing:border-box;
    }
    .multi-button span { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; min-width:0; }
    .multi-button:after { content:"⌄"; color:#64748b; font-size:14px; flex:0 0 auto; }
    .multi-select.open .multi-button:after { content:"⌃"; }
    .multi-menu {
      display:none; position:absolute; z-index:1200; left:0; right:0; top:calc(100% + 6px);
      background:rgba(255,255,255,.98); border:1px solid #dbe4ef; border-radius:14px;
      box-shadow:0 18px 36px rgba(15,23,42,.18); padding:8px; max-height:230px; overflow:auto;
    }
    .multi-select.open .multi-menu { display:block; }
    .multi-actions { display:flex; gap:6px; margin-bottom:6px; }
    .multi-actions button {
      flex:1; border:0; border-radius:9px; padding:6px; background:#e2e8f0;
      color:#334155; font-size:11.5px; font-weight:650; cursor:pointer; letter-spacing:.005em;
    }
    .multi-option {
      display:flex; align-items:center; gap:7px; padding:7px 6px; border-radius:9px;
      font-size:12.5px; color:#334155; cursor:pointer; line-height:1.45; font-weight:500; letter-spacing:.005em;
    }
    .multi-option:hover { background:#f1f5f9; }
    .multi-option input { accent-color:#2563eb; }
    .count { margin-top:10px !important; font-size:12.5px !important; font-weight:650; color:#0f172a !important; letter-spacing:.005em; }
    .legend { margin-top:10px; padding-top:10px; border-top:1px solid var(--line); }
    .legend-title { font-size:11.5px; font-weight:700; color:#334155; margin-bottom:7px; letter-spacing:.01em; }
    .legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }

    .legend-dot { width:11px; height:11px; border-radius:999px; border:2px solid white; box-shadow:0 2px 8px rgba(15,23,42,.22); flex:0 0 auto; }
    .marker {
      width:18px; height:18px; border-radius:999px; border:2px solid white;
      box-shadow:0 7px 18px rgba(15,23,42,.34);
    }
    .custom-cluster {
      width:34px; height:34px; border-radius:999px; display:flex; align-items:center; justify-content:center;
      background:rgba(15,23,42,.86); color:#fff; border:2px solid rgba(255,255,255,.92);
      box-shadow:0 9px 20px rgba(15,23,42,.32); font-size:12px; font-weight:900;

    .leaflet-tooltip.job-tooltip { background:transparent; border:0; box-shadow:none; padding:0; white-space:normal; max-width:none; }

    .hover-top { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }

      return `<div class="job-hover-card hover-compact">
        <div class="hover-top"><i class="hover-dot" style="background:${job.color}"></i><div><div class="hover-company">${esc(clip(job.company,34))}</div><div class="hover-role">${esc(clip(job.role,54))}</div></div></div>
        <div class="pills"><span class="pill">${esc(job.type)}</span><span class="pill">ABC：${esc(job.abcTier || '未分档')}${job.abcScore ? ' / ' + esc(job.abcScore) : ''}</span><span class="pill">匹配：${esc(job.fit || '待确认')}</span><span class="pill warn">${esc(clip(job.jdPrecision || '需核验',18))}</span></div>
        <div class="info-grid">${field('城市',job.city,24)}${field('薪资',job.salary,22)}</div>
        ${section('岗位摘要',job.roleSummary,72)}
      </div>`;
    }
    function detailCard(job) {
      return `<div class="job-hover-card">
        <div class="hover-top"><i class="hover-dot" style="background:${job.color}"></i><div><div class="hover-company">${esc(clip(job.company,34))}</div><div class="hover-role">${esc(clip(job.role,62))}</div></div></div>
        <div class="pills"><span class="pill">${esc(job.type)}</span><span class="pill">ABC：${esc(job.abcTier || '未分档')}${job.abcScore ? ' / ' + esc(job.abcScore) : ''}</span><span class="pill">${esc(job.priority || '未分级')}</span><span class="pill">匹配：${esc(job.fit || '待确认')}</span><span class="pill warn">${esc(clip(job.jdPrecision || '需核验',18))}</span></div>
        <div class="info-grid">${field('城市',job.city,24)}${field('薪资',job.salary,22)}${field('主线',job.mainline,34)}${field('下一步',job.abcNextAction,22)}${field('点位',job.pointPrecision,18)}${field('可信度',job.confidence,18)}</div>
        ${section('ABC理由',job.abcReason,140)}${section('岗位内容',job.roleSummary,96)}${section('地图地址',job.mapAddress,96)}${section('关键风险',job.keyRisk || job.risk,96)}${section('推荐简历',job.resumeVersion,90)}
      </div>`;
    }
    function popupCard(job) {
      return `<div class="popup-card">${detailCard(job)}
        ${section('公司业务',job.companyBusiness,240)}${section('行业地位',job.companyStatus,220)}${section('语言/签证/代码风险',job.languageRisk,220)}${section('在线核验',job.onlineStatus,220)}
        ${job.link ? `<a class="open-link" target="_blank" href="${esc(job.link)}">打开招聘链接</a>` : ''}
      </div>`;
    }

    const typeOptions = ['正式岗', '实习岗', '次选', '扩源新增'].filter((v) => jobs.some((job) => job.type === v));
    const mainlineOptions = ['主线A', '主线B', '备线', '次选'].filter((v) => jobs.some((job) => mainlineGroup(job) === v));
    const regionOptions = ['深圳', '香港', '广州', '东莞', '佛山', '惠州'].filter((v) => jobs.some((job) => job.region === v));
    const fitOptions = ['超高', '高', '中高', '中'].filter((v) => jobs.some((job) => job.fit === v));
    const salaryOptions = unique(jobs.map((job) => job.salaryFit)).filter(Boolean);
    const jdOptions = unique(jobs.map((job) => job.jdPrecision)).filter(Boolean);
    const confidenceOptions = ['高', '中高', '中', '低'].filter((v) => jobs.some((job) => job.confidence === v));
    const riskOptions = unique(jobs.flatMap((job) => riskGroups(job)));
    const abcOptions = ['A', 'B', 'C'].filter((v) => jobs.some((job) => (job.abcTier || '未分档') === v));
    const newOptions = ['今日新增', '存量岗位'].filter((v) => jobs.some((job) => (job.isNew ? '今日新增' : '存量岗位') === v));
    createMultiSelect('typeFilter', '岗位类型', typeOptions, ['正式岗', '实习岗']);
    createMultiSelect('mainlineFilter', '主线分类', mainlineOptions, ['主线A', '主线B', '备线']);
    createMultiSelect('regionFilter', '城市', regionOptions, regionOptions);
    createMultiSelect('fitFilter', '匹配度', fitOptions, fitOptions);
    createMultiSelect('salaryFilter', '薪资匹配', salaryOptions, salaryOptions);
    createMultiSelect('jdFilter', 'JD精确度', jdOptions, jdOptions);
    createMultiSelect('confidenceFilter', '数据可信度', confidenceOptions, confidenceOptions);
    createMultiSelect('riskFilter', '风险标签', riskOptions, riskOptions);
    createMultiSelect('abcFilter', 'ABC档位', abcOptions, abcOptions);
    createMultiSelect('newFilter', '新增状态', newOptions, newOptions);


    const filterPanel = document.getElementById('filterPanel');
    const panelToggle = document.getElementById('panelToggle');
    if (filterPanel && panelToggle) {
      panelToggle.addEventListener('click', () => {
        const collapsed = filterPanel.classList.toggle('collapsed');
        panelToggle.textContent = collapsed ? '展开' : '收起';
        panelToggle.setAttribute('aria-expanded', String(!collapsed));
      });
    }

    function render() {
      const types = selectedSet('typeFilter');
      const mainlines = selectedSet('mainlineFilter');
      const regions = selectedSet('regionFilter');
      const fits = selectedSet('fitFilter');
      const salaryFits = selectedSet('salaryFilter');
      const jdPrecisions = selectedSet('jdFilter');
      const confidences = selectedSet('confidenceFilter');
      const risks = selectedSet('riskFilter');
      const abcTiers = selectedSet('abcFilter');
      const newStates = selectedSet('newFilter');
      const filtered = jobs.filter((job) =>
        types.has(job.type) &&
        mainlines.has(mainlineGroup(job)) &&
        regions.has(job.region) &&
        fits.has(job.fit) &&
        salaryFits.has(job.salaryFit || '') &&
        jdPrecisions.has(job.jdPrecision || '') &&
        confidences.has(job.confidence || '') &&
        riskGroups(job).some((risk) => risks.has(risk)) &&
        abcTiers.has(job.abcTier || '未分档') &&
        newStates.has(job.isNew ? '今日新增' : '存量岗位')
      );
      cluster.clearLayers();
      filtered.forEach((job) => {
        const marker = L.marker([job.displayLat, job.displayLng], { icon:icon(job.color), title:`${job.company} - ${job.role}` });
        marker.bindTooltip(hoverCard(job), { className:'job-tooltip', direction:'top', offset:[0,-16], opacity:1, sticky:true, interactive:true });
        marker.bindPopup(popupCard(job), { maxWidth:560, autoPan:true, keepInView:true });
        cluster.addLayer(marker);
      });
      map.addLayer(cluster);
      document.getElementById('countText').textContent = `当前显示：${filtered.length} / 总岗位点：${jobs.length}；覆盖城市：${regionOptions.length}`;
    }
    render();
  </script>
</body>
</html>
